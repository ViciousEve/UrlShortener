name: Shortly

services:
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    environment:
      - POSTGRES_DB=shortly
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_password_here
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: ${COMPOSE_PROJECT_NAME}-api
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=shortly;Username=admin;Password=your_password_here;
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-ui
    working_dir: /app
    command: >
      sh -c "apk add --no-cache py3-pip &&
      npm install -g yarn &&
      yarn install &&
      yarn run dev -- --host [IP_ADDRESS] --port 3000"
    volumes:
      - ./Front-end:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local