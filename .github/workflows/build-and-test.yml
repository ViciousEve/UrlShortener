name: .NET

on:
  push:
    branches: [ "master", "Develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore Back-end/UrlShortener.slnx
    - name: Build
      run: dotnet build Back-end/UrlShortener.slnx --no-restore
    - name: Test
      run: dotnet test Back-end/UrlShortener.slnx --no-build --verbosity normal
